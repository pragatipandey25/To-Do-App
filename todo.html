<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="todo.css">
</head>
<body>
  <div class="bg-shape bg-shape-one" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-two" aria-hidden="true"></div>

  <main class="app" aria-label="Todo application">
    <header class="app-header">
      <p class="badge">Stay Focused</p>
      <h1>My Todo List</h1>
      <p class="subtitle">Plan less. Do more. Keep your day in motion.</p>
    </header>

    <form id="todoForm" class="todo-form" autocomplete="off">
      <label class="visually-hidden" for="todoInput">Add a new task</label>
      <input id="todoInput" name="todoInput" type="text" maxlength="120" placeholder="What needs to be done today?" required>
      <button type="submit">Add Task</button>
    </form>

    <section class="controls" aria-label="Todo filters">
      <div class="filter-group" id="filterGroup" role="group" aria-label="Filter tasks">
        <button type="button" class="chip is-active" data-filter="all">All</button>
        <button type="button" class="chip" data-filter="active">Active</button>
        <button type="button" class="chip" data-filter="completed">Completed</button>
      </div>
      <button type="button" id="clearCompleted" class="ghost-btn">Clear Completed</button>
    </section>

    <ul id="todoList" class="todo-list" aria-live="polite"></ul>

    <footer class="app-footer">
      <p><span id="itemsLeft">0</span> items left</p>
      <p id="todoHint">Tip: click task text to toggle complete.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
